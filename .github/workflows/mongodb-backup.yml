name: MongoDB Atlas Backup

on:
  schedule:
    - cron: '0 */5 * * *' # Every 5 hours
  workflow_dispatch: # Manual trigger

jobs:
  backup:
    runs-on: ubuntu-22.04
    steps:
    - name: Install MongoDB Tools
      run: |
        curl -fsSL https://www.mongodb.org/static/pgp/server-7.0.asc | \
           sudo gpg -o /usr/share/keyrings/mongodb-server-7.0.gpg \
           --dearmor
        echo "deb [ arch=amd64,arm64 signed-by=/usr/share/keyrings/mongodb-server-7.0.gpg ] https://repo.mongodb.org/apt/ubuntu jammy/mongodb-org/7.0 multiverse" | \
           sudo tee /etc/apt/sources.list.d/mongodb-org-7.0.list
        sudo apt-get update
        sudo apt-get install -y mongodb-database-tools

    - name: Run mongodump
      env:
        MONGODB_ATLAS_URI: ${{ secrets.MONGODB_ATLAS_URI }}
        MONGODB_ATLAS_DATABASE: ${{ secrets.MONGODB_ATLAS_DATABASE }}
      run: |
        if [ -z "$MONGODB_ATLAS_URI" ]; then
          echo "MONGODB_ATLAS_URI secret is not set"
          exit 1
        fi
        mkdir dump
        mongodump --uri="$MONGODB_ATLAS_URI" --db="$MONGODB_ATLAS_DATABASE" --out=dump/

    - name: Archive Backup
      run: |
        TIMESTAMP=$(date +%Y%m%d_%H%M%S)
        echo "BACKUP_FILENAME=mongodb_backup_${TIMESTAMP}.zip" >> $GITHUB_ENV
        zip -r mongodb_backup_${TIMESTAMP}.zip dump/

    - name: Upload to Backblaze B2
      env:
        B2_APPLICATION_KEY_ID: ${{ secrets.B2_APPLICATION_KEY_ID }}
        B2_APPLICATION_KEY: ${{ secrets.B2_APPLICATION_KEY }}
        B2_BUCKET_NAME: ${{ secrets.B2_BUCKET_NAME }}
      run: |
        pip install b2 --quiet
        b2 authorize-account "$B2_APPLICATION_KEY_ID" "$B2_APPLICATION_KEY"
        b2 upload-file "$B2_BUCKET_NAME" "$BACKUP_FILENAME" "backups/$BACKUP_FILENAME"
        echo "Uploaded $BACKUP_FILENAME to B2 bucket: $B2_BUCKET_NAME"

    - name: Upload Artifact (short-term)
      uses: actions/upload-artifact@v4
      with:
        name: mongodb-atlas-dump
        path: mongodb_backup_*.zip
        retention-days: 7
