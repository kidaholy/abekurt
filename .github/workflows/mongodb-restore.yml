name: MongoDB Atlas Restore

on:
  workflow_dispatch:
    inputs:
      artifact_name:
        description: 'Name of the GitHub artifact to restore from'
        required: false
      backup_url:
        description: 'Direct URL to the backup zip file'
        required: false
      b2_filename:
        description: 'Filename in Backblaze B2 to restore from (e.g. backups/mongodb_backup_20240101_000000.zip)'
        required: false

jobs:
  restore:
    runs-on: ubuntu-22.04
    steps:
    - name: Install MongoDB Tools
      run: |
        curl -fsSL https://www.mongodb.org/static/pgp/server-7.0.asc | \
           sudo gpg -o /usr/share/keyrings/mongodb-server-7.0.gpg \
           --dearmor
        echo "deb [ arch=amd64,arm64 signed-by=/usr/share/keyrings/mongodb-server-7.0.gpg ] https://repo.mongodb.org/apt/ubuntu jammy/mongodb-org/7.0 multiverse" | \
           sudo tee /etc/apt/sources.list.d/mongodb-org-7.0.list
        sudo apt-get update
        sudo apt-get install -y mongodb-database-tools

    - name: Download from Backblaze B2
      if: "${{ github.event.inputs.b2_filename != '' }}"
      env:
        B2_APPLICATION_KEY_ID: ${{ secrets.B2_APPLICATION_KEY_ID }}
        B2_APPLICATION_KEY: ${{ secrets.B2_APPLICATION_KEY }}
        B2_BUCKET_NAME: ${{ secrets.B2_BUCKET_NAME }}
      run: |
        pip install b2 --quiet
        b2 authorize-account "$B2_APPLICATION_KEY_ID" "$B2_APPLICATION_KEY"
        mkdir -p restore_dump
        b2 download-file-by-name "$B2_BUCKET_NAME" "${{ github.event.inputs.b2_filename }}" restore_dump/backup.zip
        unzip restore_dump/backup.zip -d restore_dump/

    - name: Download Artifact
      if: "${{ github.event.inputs.artifact_name != '' }}"
      uses: actions/download-artifact@v4
      with:
        name: ${{ github.event.inputs.artifact_name }}
        path: restore_dump

    - name: Download from URL
      if: "${{ github.event.inputs.backup_url != '' }}"
      run: |
        mkdir -p restore_dump
        curl -L "${{ github.event.inputs.backup_url }}" -o restore_dump/backup.zip
        unzip restore_dump/backup.zip -d restore_dump/

    - name: Run mongorestore
      env:
        MONGODB_ATLAS_URI: ${{ secrets.MONGODB_ATLAS_URI }}
      run: |
        if [ -z "$MONGODB_ATLAS_URI" ]; then
          echo "MONGODB_ATLAS_URI secret is not set"
          exit 1
        fi
        DUMP_DIR=$(find restore_dump -name "dump" -type d | head -n 1)
        if [ -z "$DUMP_DIR" ]; then
          DUMP_DIR=$(find restore_dump -maxdepth 2 -type d ! -path "restore_dump" | head -n 1)
        fi
        echo "Restoring from $DUMP_DIR"
        mongorestore --uri="$MONGODB_ATLAS_URI" --drop "$DUMP_DIR"
